<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TEMPEST</title>

<!-- ── PWA / Home Screen ── -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TEMPEST">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000009">
<meta name="description" content="Tempest arcade game — tubes, flippers, and superzappers">

<!-- Icon injected by JS below (needs canvas to generate) -->
<link id="touch-icon" rel="apple-touch-icon">
<link id="pwa-icon"   rel="icon" type="image/png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">

<script>
// ── Generate Tempest icon as a canvas data URI ──
// Runs before the game so the <link> tags get populated immediately.
(function(){
  const SZ  = 512;
  const ic  = document.createElement('canvas');
  ic.width  = SZ; ic.height = SZ;
  const c   = ic.getContext('2d');
  const cx  = SZ/2, cy = SZ/2;

  // Background
  c.fillStyle = '#000009'; c.fillRect(0,0,SZ,SZ);

  // Rounded rect background glow
  c.shadowColor='#0044cc'; c.shadowBlur=60;
  c.fillStyle='#000820';
  c.beginPath();
  c.roundRect(24,24,SZ-48,SZ-48,64);
  c.fill(); c.shadowBlur=0;

  // Draw a mini tube (circle with N=8 lanes)
  const N=8, OR=175, IR=42;
  const outerPts=[], innerPts=[];
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2-Math.PI/2;
    outerPts.push({x:cx+Math.cos(a)*OR,y:cy+Math.sin(a)*OR});
    innerPts.push({x:cx+Math.cos(a)*IR,y:cy+Math.sin(a)*IR});
  }

  // Lane lines
  for(let i=0;i<N;i++){
    c.beginPath();
    c.moveTo(outerPts[i].x,outerPts[i].y);
    c.lineTo(innerPts[i].x,innerPts[i].y);
    c.strokeStyle='#1a40cc'; c.lineWidth=3;
    c.shadowColor='#1a40cc'; c.shadowBlur=8;
    c.stroke();
  }

  // Outer rim
  c.beginPath();
  outerPts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
  c.closePath();
  c.strokeStyle='#1a40cc'; c.lineWidth=5;
  c.shadowColor='#3366ff'; c.shadowBlur=18;
  c.stroke();

  // Inner rim
  c.beginPath();
  innerPts.forEach((p,i)=>i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y));
  c.closePath();
  c.strokeStyle='#0a2060'; c.lineWidth=2.5;
  c.shadowBlur=6; c.stroke(); c.shadowBlur=0;

  // Active lane highlight (lane 0)
  c.beginPath();
  c.moveTo(outerPts[0].x,outerPts[0].y);
  c.lineTo(outerPts[1].x,outerPts[1].y);
  c.lineTo(innerPts[1].x,innerPts[1].y);
  c.lineTo(innerPts[0].x,innerPts[0].y);
  c.closePath();
  c.fillStyle='rgba(0,180,255,0.10)'; c.fill();

  // Player claw on lane 0
  const pl=0, pr=1;
  const oc0={x:(outerPts[pl].x+outerPts[pr].x)/2,y:(outerPts[pl].y+outerPts[pr].y)/2};
  const ic0={x:(innerPts[pl].x+innerPts[pr].x)/2,y:(innerPts[pl].y+innerPts[pr].y)/2};
  const tipX=outerPts[pl].x+(ic0.x-outerPts[pl].x)*0.18;
  const tipY=outerPts[pl].y+(ic0.y-outerPts[pl].y)*0.18;
  c.beginPath();
  c.moveTo(outerPts[pl].x,outerPts[pl].y);
  c.lineTo(tipX,tipY);
  c.lineTo(outerPts[pr].x,outerPts[pr].y);
  c.strokeStyle='#00eeff'; c.lineWidth=7;
  c.shadowColor='#00eeff'; c.shadowBlur=20;
  c.stroke();
  // crossbar
  const caX=outerPts[pl].x+(outerPts[pr].x-outerPts[pl].x)*0.22;
  const caY=outerPts[pl].y+(outerPts[pr].y-outerPts[pl].y)*0.22;
  const cbX=outerPts[pl].x+(outerPts[pr].x-outerPts[pl].x)*0.78;
  const cbY=outerPts[pl].y+(outerPts[pr].y-outerPts[pl].y)*0.78;
  c.beginPath(); c.moveTo(caX,caY); c.lineTo(cbX,cbY);
  c.lineWidth=5; c.stroke(); c.shadowBlur=0;

  // TEMPEST wordmark
  c.font='bold 62px monospace';
  c.textAlign='center'; c.textBaseline='middle';
  c.fillStyle='#ddeeff';
  c.shadowColor='#00eeff'; c.shadowBlur=22;
  c.fillText('TEMPEST', cx, SZ-72);
  c.shadowBlur=0;

  const dataURL = ic.toDataURL('image/png');
  document.getElementById('touch-icon').href = dataURL;
  document.getElementById('pwa-icon').href   = dataURL;

  // ── Inline Web App Manifest as blob URL ──
  const manifest = {
    name:             'TEMPEST',
    short_name:       'TEMPEST',
    description:      'Classic Tempest arcade game',
    start_url:        '.',
    display:          'fullscreen',
    orientation:      'any',
    background_color: '#000009',
    theme_color:      '#000009',
    icons: [
      { src: dataURL, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const mURL = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel='manifest'; link.href=mURL;
  document.head.appendChild(link);

  // ── Inline Service Worker as blob URL — enables offline play ──
  const swCode = `
    const CACHE='tempest-v1';
    self.addEventListener('install', e=>{
      e.waitUntil(
        caches.open(CACHE).then(c=>c.addAll([self.location.href]))
          .then(()=>self.skipWaiting())
      );
    });
    self.addEventListener('activate', e=>{
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL  = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(swURL, {scope:'./'}).catch(()=>{});
  }
})();
</script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    overscroll-behavior: none;
    position: fixed;
    top: 0; left: 0;
  }
  canvas {
    display: block;
    cursor: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════════════
//   T E M P E S T  ·  Modern Minimal  ·  2024
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// iPadOS 13+ sends a desktop Safari user agent — maxTouchPoints catches it reliably
const IS_MOBILE = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
               || navigator.maxTouchPoints > 1
               || ('ontouchstart' in window);

let W, H;
function resize() {
  if (IS_MOBILE) { W = window.innerWidth; H = window.innerHeight; }
  else           { W = H = Math.min(window.innerWidth, window.innerHeight, 820); }
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); buildGeometry(); });

// ─── BLOCK ALL SCROLL ─────────────────────────────
const blockScroll = e => e.preventDefault();
document.addEventListener('wheel',      blockScroll, { passive: false });
document.addEventListener('touchmove',  blockScroll, { passive: false });
document.addEventListener('touchstart', blockScroll, { passive: false });

// ─── PALETTE ─────────────────────────────────────
const PAL = {
  bg:         '#000009',
  tube:       '#0a2060',
  tubeGlow:   '#1a40cc',
  tubeActive: '#00c8ff',
  aGlow:      '#0099dd',
  player:     '#00eeff',
  pGlow:      '#00aabb',
  bullet:     '#ffffff',
  bGlow:      '#99ddff',
  flipper:    '#00ff88',
  fGlow:      '#00bb55',
  spiker:     '#ff9900',
  sGlow:      '#cc6600',
  tanker:     '#ff1a4a',
  tGlow:      '#cc0033',
  spike:      '#ff5500',
  spGlow:     '#cc3300',
  fuseball:   '#ff44ff',
  fbGlow:     '#aa00aa',
  zapper:     '#ffff44',
  zGlow:      '#aaaa00',
  hud:        '#7799cc',
  hudHi:      '#ddeeff',
  touchRing:  'rgba(0,200,255,0.15)',
  touchDot:   '#00eeff',
};

// ─── GEOMETRY ────────────────────────────────────
const N = 16;
let outer, inner, tubeCX, tubeCY, tubeOR, tubeIR;

// ── Regular polygon radius formula ──
function polyR(angle, k) {
  const s = (Math.PI * 2) / k;
  const a = ((angle % s) + s) % s;
  return Math.cos(Math.PI / k) / Math.cos(a - Math.PI / k);
}

// ── Tube shape definitions ──
// Each returns a normalized {x,y} (radius ~1) for point i of N
// Multiply by tubeOR + offset by tubeCX,tubeCY for canvas coords
const TUBE_SHAPES = [
  { name: 'CIRCLE',
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      return { x: Math.cos(a), y: Math.sin(a) };
    }},
  { name: 'SQUARE',
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/4;
      const r = polyR(a, 4) * 0.82;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'TRIANGLE',
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const r = polyR(a, 3) * 0.84;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'STAR',       // 8-pointed star — alternating near/far
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const r = (i % 2 === 0) ? 1.0 : 0.46;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'PLUS',       // cross/plus — 4 arms, 16 explicit points
    pt: i => {
      const w = 0.30, s = 0.82;
      const P = [
        {x:-w,y:-1},{x:0,y:-1},{x:w,y:-1}, // top arm
        {x:w,y:-w},                          // inner corner TR
        {x:1,y:-w},{x:1,y:0},{x:1,y:w},    // right arm
        {x:w,y:w},                           // inner corner BR
        {x:w,y:1},{x:0,y:1},{x:-w,y:1},    // bottom arm
        {x:-w,y:w},                          // inner corner BL
        {x:-1,y:w},{x:-1,y:0},{x:-1,y:-w}, // left arm
        {x:-w,y:-w},                         // inner corner TL
      ];
      return { x: P[i].x*s, y: P[i].y*s };
    }},
  { name: 'HEXAGON',
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const r = polyR(a, 6) * 0.92;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'RIPPLE',     // sine-modulated circle — 4 waves
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const r = 1.0 + Math.sin(a * 4) * 0.26;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'CLAW',       // 4-lobed flower / claw shape
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/4;
      const r = 0.68 + Math.cos(a * 4) * 0.33;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'DIAMOND',    // square rotated 45°
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const r = polyR(a, 4) * 0.82;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };  // polyR handles rotation naturally
    }},
  { name: 'ZIGZAG',     // alternating inner/outer but 4 groups — jagged square feel
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const pulse = (i % 4 < 2) ? 1.0 : 0.62;
      const r = pulse;
      return { x: Math.cos(a)*r, y: Math.sin(a)*r };
    }},
  { name: 'BOWTIE',     // pinched hourglass / bowtie
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      const pinch = 1.0 - Math.pow(Math.sin(a * 2), 2) * 0.48;
      return { x: Math.cos(a)*pinch, y: Math.sin(a)*pinch };
    }},
  { name: 'CROSS',      // diagonal cross / X shape
    pt: i => {
      const a = (i/N)*Math.PI*2 - Math.PI/2 + Math.PI/4;
      const w = 0.30, s = 0.82;
      const P = [
        {x:-w,y:-1},{x:0,y:-1},{x:w,y:-1},
        {x:w,y:-w},
        {x:1,y:-w},{x:1,y:0},{x:1,y:w},
        {x:w,y:w},
        {x:w,y:1},{x:0,y:1},{x:-w,y:1},
        {x:-w,y:w},
        {x:-1,y:w},{x:-1,y:0},{x:-1,y:-w},
        {x:-w,y:-w},
      ];
      const c = Math.cos(Math.PI/4), ss = Math.sin(Math.PI/4);
      const p = P[i];
      return { x: (p.x*c - p.y*ss)*s, y: (p.x*ss + p.y*c)*s };
    }},

  // ── OPEN tubes — ends don't connect, player clamps at edges ──
  { name: 'FLAT',   open: true,
    pt: i => {
      // Straight horizontal line — spans full width
      const t = (i / (N - 1)) * 2 - 1;   // -1 to +1
      return { x: t * 0.92, y: 0 };
    }},
  { name: 'V-SHAPE', open: true,
    pt: i => {
      const t = (i / (N - 1)) * 2 - 1;   // -1 to +1
      return { x: t * 0.92, y: Math.abs(t) * 0.72 - 0.36 };
    }},
  { name: 'U-SHAPE', open: true,
    pt: i => {
      const t  = (i / (N - 1)) * 2 - 1;
      return { x: t * 0.82, y: t * t * 0.70 - 0.35 };
    }},
  { name: 'SLOPE',  open: true,
    pt: i => {
      const t = (i / (N - 1)) * 2 - 1;
      return { x: t * 0.90, y: t * 0.44 };
    }},
];

const NUM_SHAPES = TUBE_SHAPES.length;
let currentShapeIdx  = 0;
let shapeSequence    = [];  // shuffled play order for current cycle
let shapeSeqPos      = 0;   // position within current cycle

function buildShapeSequence() {
  // Always start a fresh cycle with CIRCLE (index 0), then shuffle the rest
  const rest = Array.from({length: NUM_SHAPES - 1}, (_, i) => i + 1);
  // Fisher-Yates shuffle
  for (let i = rest.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [rest[i], rest[j]] = [rest[j], rest[i]];
  }
  shapeSequence = [0, ...rest];
  shapeSeqPos   = 0;
}

function nextShapeIdx() {
  if (shapeSequence.length === 0 || shapeSeqPos >= shapeSequence.length) {
    buildShapeSequence();
    // After the very first cycle, don't force circle at start of subsequent cycles
    if (shapeSeqPos > 0) {
      // re-shuffle the whole thing for cycle 2+
      for (let i = shapeSequence.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shapeSequence[i], shapeSequence[j]] = [shapeSequence[j], shapeSequence[i]];
      }
    }
  }
  return shapeSequence[shapeSeqPos++];
}
let tubeOpen    = false;
let tubeOuterCY = 0;   // Y of outer rim (used for open tubes)
let tubeInnerCY = 0;   // Y of vanishing point (used for open tubes)

function buildGeometry(shapeIdx) {
  shapeIdx        = ((shapeIdx || 0) % NUM_SHAPES + NUM_SHAPES) % NUM_SHAPES;
  currentShapeIdx = shapeIdx;
  const gH    = H - zapBtnH();
  const shape = TUBE_SHAPES[shapeIdx];
  tubeOpen    = !!shape.open;
  tubeCX      = W / 2;
  outer       = [];
  inner       = [];

  if (!tubeOpen) {
    // ── CLOSED tubes ──
    // Auto-scale: normalize so the shape's widest point fills the target radius.
    // This means STAR, ZIGZAG etc. all fill the same circle as CIRCLE.
    tubeCY  = gH / 2;
    const baseR = Math.min(W * 0.88, gH * 0.82) * 0.5;   // target outer radius
    const rawPts = Array.from({length: N}, (_, i) => shape.pt(i));
    const maxR   = Math.max(...rawPts.map(p => Math.sqrt(p.x*p.x + p.y*p.y)));
    tubeOR  = baseR / Math.max(maxR, 0.01);
    tubeIR  = tubeOR * 0.14;

    outer = rawPts.map(pt => ({ x: tubeCX + pt.x * tubeOR, y: tubeCY + pt.y * tubeOR }));
    inner = Array.from({length: N}, (_, i) => {
      const a = (i / N) * Math.PI * 2 - Math.PI / 2;
      return { x: tubeCX + Math.cos(a) * tubeIR, y: tubeCY + Math.sin(a) * tubeIR };
    });

  } else {
    // ── OPEN tubes — corridor perspective ──
    // Outer rim sits near the top of the play area, spanning the full width.
    // The vanishing point drops toward center, creating proper depth.
    tubeOuterCY = gH * 0.18;              // outer rim: upper portion
    tubeInnerCY = gH * 0.58;             // vanishing point: center-lower
    tubeCY      = (tubeOuterCY + tubeInnerCY) / 2;   // logical midpoint for game coords

    const outerHalfW = W * 0.44;         // spans ~88% of screen width
    tubeOR = outerHalfW;                 // reference scale for lanePos interpolation
    tubeIR = outerHalfW * 0.04;         // tiny spread at vanishing point

    outer = Array.from({length: N}, (_, i) => {
      const pt = shape.pt(i);
      // pt.x spans -1..+1 for the width, pt.y adds curve (V, U shapes)
      const outerVerticalSpan = gH * 0.18;  // how much curve shapes rise/fall
      return {
        x: tubeCX + pt.x * outerHalfW,
        y: tubeOuterCY + pt.y * outerVerticalSpan,
      };
    });
    inner = Array.from({length: N}, (_, i) => {
      // All inner points converge near the vanishing point with tiny spread
      const t = (i / (N - 1)) * 2 - 1;
      return { x: tubeCX + t * tubeIR, y: tubeInnerCY };
    });
  }
}

const zapBtnH  = () => IS_MOBILE ? Math.floor(H * 0.13) : 0;
const gameH    = () => H - zapBtnH();

buildGeometry(0);
window.addEventListener('resize', () => { resize(); buildGeometry(currentShapeIdx); });

function lanePos(lane, depth) {
  const l  = ((lane | 0) % N + N) % N, r = (l + 1) % N;
  const oc = { x: (outer[l].x + outer[r].x) / 2, y: (outer[l].y + outer[r].y) / 2 };
  const ic = { x: (inner[l].x + inner[r].x) / 2, y: (inner[l].y + inner[r].y) / 2 };
  return { x: oc.x + (ic.x - oc.x) * depth, y: oc.y + (ic.y - oc.y) * depth };
}

function rimPos(laneFrac) {
  const l = Math.floor(laneFrac) % N, f = laneFrac - Math.floor(laneFrac), r = (l + 1) % N;
  return { x: outer[l].x + (outer[r].x - outer[l].x) * f,
           y: outer[l].y + (outer[r].y - outer[l].y) * f };
}

// ── Convert canvas XY → lane index ──
// Finds the nearest outer rim point to the finger — works correctly for ALL
// tube shapes (square, star, etc.) where angular mapping breaks down.
// Open tubes: linear X fallback since outer points are collinear.
const DEAD_ZONE_FRAC = 0.28;
function touchToLane(cx, cy) {
  if (tubeOpen) {
    const halfW = tubeOR;
    const t     = (cx - tubeCX) / halfW;
    if (Math.abs(t) > 1.15) return -1;
    const lane = Math.floor(((t + 1) / 2) * (N - 1));
    return Math.max(0, Math.min(N - 2, lane));
  }

  // Dead zone: too close to center
  const dx = cx - tubeCX, dy = cy - tubeCY;
  if (Math.sqrt(dx*dx + dy*dy) < tubeOR * DEAD_ZONE_FRAC) return -1;

  // Find nearest outer node to finger
  let bestNode = 0, bestDist = Infinity;
  for (let i = 0; i < N; i++) {
    const ddx = cx - outer[i].x, ddy = cy - outer[i].y;
    const d   = ddx*ddx + ddy*ddy;
    if (d < bestDist) { bestDist = d; bestNode = i; }
  }

  // bestNode is the left corner of lane bestNode.
  // Check whether lane bestNode or lane (bestNode-1) has its midpoint closer.
  const prev    = wrap(bestNode - 1, N);
  const midCurr = {
    x: (outer[bestNode].x + outer[wrap(bestNode+1,N)].x) / 2,
    y: (outer[bestNode].y + outer[wrap(bestNode+1,N)].y) / 2,
  };
  const midPrev = {
    x: (outer[prev].x + outer[bestNode].x) / 2,
    y: (outer[prev].y + outer[bestNode].y) / 2,
  };
  const dCurr = (cx-midCurr.x)**2 + (cy-midCurr.y)**2;
  const dPrev = (cx-midPrev.x)**2 + (cy-midPrev.y)**2;
  return dPrev < dCurr ? prev : bestNode;
}

// ─── HELPERS ─────────────────────────────────────
const lerp   = (a, b, t) => a + (b - a) * t;
const lerpPt = (a, b, t) => ({ x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t) });
const rand   = (lo, hi)  => lo + Math.random() * (hi - lo);
const randi  = (lo, hi)  => Math.floor(rand(lo, hi + 0.9999));
const wrap   = (v, n)    => ((v % n) + n) % n;
const glow   = (c, b)    => { ctx.shadowColor = c; ctx.shadowBlur = b; };
const noGlow = ()        => { ctx.shadowBlur  = 0; };

// ═══════════════════════════════════════════════════
//   W E B  A U D I O  ·  Tempest Sound Engine
// ═══════════════════════════════════════════════════
let audioCtx = null, muted = false;
let droneGain = null, droneOsc1 = null, droneOsc2 = null, droneStarted = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // iOS suspends AudioContext until a user gesture — resume every time we're called
  // from within a touch/click handler to guarantee it's unlocked

// ─── GAME STATE ──────────────────────────────────
let gs;
function newGS() {
  return { mode:'title',timer:0,score:0,hiScore:0,lives:3,level:1,
    waveCap:0,waveKilled:0,spawnTimer:0,spawnRate:90,zapUsed:0,flash:0,
    zoomScale:1, zoomVel:0,   // tube travel transition
    rimFlash: null,           // {lane, timer} flash when rim enemy is shot
    player:{lane:0,laneFrac:0,laneVel:0,movCD:0,shootCD:0},
    bullets:[],enemies:[],rimEnemy:[],spikes:[],particles:[] };
}
gs = newGS();

function startGame() {
  ensureAudio();
  const hi = gs.hiScore; gs=newGS(); gs.hiScore=hi; gs.mode='playing';
  droneStarted=false;
  buildShapeSequence();   // fresh shuffle for this playthrough
  startDrone();
  loadLevel(true);
}
function loadLevel(newLevel) {
  gs.bullets=[]; gs.enemies=[]; gs.rimEnemy=[]; gs.spikes=[]; gs.particles=[];
  gs.zapUsed=0; gs.spawnTimer=0; gs.waveKilled=0;
  gs.waveCap=6+gs.level*3; gs.spawnRate=Math.max(28,90-gs.level*6);
  gs.player.lane=0; gs.player.laneFrac=0; gs.player.laneVel=0; gs.player.movCD=0; gs.player.shootCD=0;
  // Only advance the shape when genuinely starting a new level — not on death respawn
  if (newLevel || gs.levelShapeIdx === undefined) {
    gs.levelShapeIdx = gs.level === 1 ? (shapeSeqPos++, 0) : nextShapeIdx();
  }
  buildGeometry(gs.levelShapeIdx);
  gs.shapeName  = TUBE_SHAPES[gs.levelShapeIdx].name;
  gs.shapeTimer = newLevel ? 120 : 0;  // only show shape name on genuine new level
  for (let i=0;i<Math.min(3+gs.level,10);i++) spawnEnemy();
}
function spawnEnemy() {
  if (gs.waveKilled+gs.enemies.length+gs.rimEnemy.length>=gs.waveCap) return;
  const lane=randi(0,N-1),r=Math.random();
  const fbChance = gs.level >= 3 ? Math.min(0.12 + (gs.level - 3) * 0.02, 0.25) : 0;
  const type=r<fbChance?'fuseball':r<fbChance+0.54*(1-fbChance)?'flipper':r<fbChance+(0.78)*(1-fbChance)?'tanker':'spiker';
  const spd=rand(0.0018,0.003)+gs.level*0.00035;
  gs.enemies.push({type,lane,depth:rand(0.91,0.97),
    speed:type==='spiker'?spd*2.2:type==='fuseball'?spd*0.6:spd,
    rot:rand(0,Math.PI*2),rotSpeed:type==='fuseball'?rand(-0.18,0.18):rand(-0.09,0.09),
    flipCD:randi(55,145),spikerDir:1,spikeCD:randi(8,14),
    lateralCD:type==='fuseball'?randi(18,40):999});
}
function shootBullet() {
  if (gs.player.shootCD>0) return;
  gs.bullets.push({lane:gs.player.lane,depth:0.03,speed:0.028});
  gs.player.shootCD=9; sfxShoot();
}
function activateZapper() {
  if (gs.zapUsed>=2||gs.mode!=='playing') return;
  gs.zapUsed++; gs.flash=14; sfxSuperzapper();
  if (gs.zapUsed===1) {
    [...gs.enemies,...gs.rimEnemy].forEach(e=>{
      const zapPos = e.rimState
          ? ((e.rimState==='flipping' && e.pivotNode >= 0)
              ? outer[e.pivotNode]
              : (()=>{ const lL=e.rimLane||0, lR=wrap(lL+1,N);
                  return {x:lerp(outer[lL].x,outer[lR].x,e.slideT||0.5),
                          y:lerp(outer[lL].y,outer[lR].y,e.slideT||0.5)}; })())
          : lanePos(e.lane, e.depth);
        boom(zapPos,e.type,14); gs.waveKilled++;
    }); gs.enemies=[]; gs.rimEnemy=[]; gs.score+=1500;
  } else {
    const all=[...gs.enemies,...gs.rimEnemy]; if (!all.length) return;
    const t=all[randi(0,all.length-1)],ie=gs.enemies.indexOf(t),ir=gs.rimEnemy.indexOf(t);
    const tPos = ir!==-1
        ? ((t.rimState==='flipping' && t.pivotNode>=0)
            ? outer[t.pivotNode]
            : (()=>{ const lL=t.rimLane||0, lR=wrap(lL+1,N);
                return {x:lerp(outer[lL].x,outer[lR].x,t.slideT||0.5),
                        y:lerp(outer[lL].y,outer[lR].y,t.slideT||0.5)}; })())
        : lanePos(t.lane,t.depth);

function boom(pos,type,count) {

               fuseball:PAL.fuseball,player:PAL.player,spike:PAL.spike})[type]||'#fff';
  for (let i=0;i<count;i++){
    const a=rand(0,Math.PI*2),s=rand(0.8,3.5);

}
function killPlayer() {
  if (gs.mode!=='playing') return;

  boom(lanePos(gs.player.lane,0.02),'player',22); sfxDeath();

// ─── SPINNER (trackpad / wheel) ───────────────────
let spinVel=0, spinAccum=0;
const SPIN_THRESHOLD=38, SPIN_FRICTION=0.78, SPIN_MAX=180, WHEEL_MULT=0.22;

// ─── TOUCH STATE ─────────────────────────────────
// Absolute angular: we track the active touch position and map
// angle-from-center directly to lane each frame.
let touchActive  = false;   // is a finger currently down on playfield?
let touchLane    = -1;      // current lane from finger angle (-1 = dead zone)
let touchId      = null;
let touchCX      = 0;       // current finger canvas coords
let touchCY      = 0;

// ─── UPDATE ──────────────────────────────────────
function update() {
  const g=gs;
  if (g.mode==='title'||g.mode==='gameover') return;
  if (g.timer>0) g.timer--;
  if (g.flash>0) g.flash--;
  if (g.shapeTimer>0) g.shapeTimer--;
  if (g.rimFlash && --g.rimFlash.timer <= 0) g.rimFlash = null;

  if (g.mode==='dead') {
    updateParticles();
    if (g.timer<=0){
      if (g.lives<=0){g.hiScore=Math.max(g.hiScore,g.score);g.mode='gameover';droneStarted=false;}
      else {g.mode='playing';loadLevel(false);}
    } return;
  }

  // ── TUBE TRAVEL zoom transition ──
  if (g.mode==='zoom'){
    g.zoomVel *= 1.09;               // exponential acceleration — slow then FAST
    g.zoomScale += g.zoomVel;
    if (g.zoomScale >= 22) {         // tube has fully rushed past — cut to next level
      g.level++;
      g.mode     = 'playing';
      g.zoomScale = 1;
      g.zoomVel   = 0;
      loadLevel(true);
    }
    updateParticles();
    return;
  }

  if (g.mode==='levelup'){
    if (g.timer<=0){g.level++;g.mode='playing';loadLevel(true);} return;
  }

  const p=g.player;
  if (p.movCD>0)   p.movCD--;
  if (p.shootCD>0) p.shootCD--;

  // ── TOUCH: spring-accelerated angular positioning ──
  // Instead of teleporting, we apply a spring force toward the target lane.
  // Close tap = snappy. Far drag = sweeps with momentum. Feels physical.
  if (IS_MOBILE && touchActive && touchLane !== -1) {
    // Shortest arc distance on the circle (handles wrap-around)
    let diff = touchLane - p.laneFrac;
    while (diff >  N / 2) diff -= N;
    while (diff < -N / 2) diff += N;
    // Spring: accelerate toward target, friction decays velocity
    p.laneVel += diff * 0.18;   // spring constant — tweak for snap vs glide
    p.laneVel *= 0.72;          // friction — lower = snappier stop at finger
    spinVel = 0; spinAccum = 0; // don't fight with trackpad spinner
  } else if (IS_MOBILE) {
    // Finger lifted — coast to a stop
    p.laneVel *= 0.78;
    if (Math.abs(p.laneVel) < 0.02) p.laneVel = 0;
  }

  // Apply fractional lane velocity — clamp on open tubes, wrap on closed
  const maxLane = tubeOpen ? N - 2 : N;   // open: 0..(N-2), closed: wraps 0..N-1
  if (tubeOpen) {
    p.laneFrac  = Math.max(0, Math.min(maxLane, p.laneFrac + p.laneVel));
    // Bounce velocity at edges so spring doesn't stick
    if (p.laneFrac <= 0 || p.laneFrac >= maxLane) p.laneVel *= -0.3;
  } else {
    p.laneFrac  = ((p.laneFrac + p.laneVel) % N + N) % N;
  }
  p.lane = Math.round(p.laneFrac) % N;

  // ── KEYBOARD (desktop) ──
  if ((keys['ArrowLeft']||keys['KeyA'])&&p.movCD<=0){
    const nl = tubeOpen ? Math.max(0, p.lane-1) : wrap(p.lane-1,N);
    p.lane=nl; p.laneFrac=nl; p.laneVel=0; p.movCD=8;
  }
  if ((keys['ArrowRight']||keys['KeyD'])&&p.movCD<=0){
    const nl = tubeOpen ? Math.min(maxLane, p.lane+1) : wrap(p.lane+1,N);
    p.lane=nl; p.laneFrac=nl; p.laneVel=0; p.movCD=8;
  }
  if (keys['Space']||keys['ArrowUp']||keys['KeyX']) shootBullet();

  // ── SPINNER (trackpad / desktop wheel) ──
  spinAccum+=spinVel; spinVel*=SPIN_FRICTION;
  if (Math.abs(spinVel)<0.15) spinVel=0;
  while (spinAccum>= SPIN_THRESHOLD){
    const nl=tubeOpen?Math.min(maxLane,p.lane+1):wrap(p.lane+1,N);
    p.lane=nl; p.laneFrac=nl; spinAccum-=SPIN_THRESHOLD;
    if (tubeOpen && p.lane>=maxLane){spinAccum=0;spinVel*=-0.2;}
  }
  while (spinAccum<=-SPIN_THRESHOLD){
    const nl=tubeOpen?Math.max(0,p.lane-1):wrap(p.lane-1,N);
    p.lane=nl; p.laneFrac=nl; spinAccum+=SPIN_THRESHOLD;
    if (tubeOpen && p.lane<=0){spinAccum=0;spinVel*=-0.2;}
  }
  if (spinVel===0) spinAccum*=0.6;

  // ── AUTO-FIRE (mobile) ──
  if (IS_MOBILE) shootBullet();

  // ── BULLETS ──
  g.bullets=g.bullets.filter(b=>{b.depth+=b.speed;return b.depth<1;});

  // ── ENEMIES ──
  const reachedRim=[];
  g.enemies=g.enemies.filter(e=>{
    e.depth-=e.speed; e.rot+=e.rotSpeed;
    if (e.type==='flipper'){
      if (--e.flipCD<=0){
        const maxL = tubeOpen ? N-2 : N;
        const dir  = Math.random()<0.5?1:-1;
        e.lane     = tubeOpen ? Math.max(0,Math.min(maxL,e.lane+dir)) : wrap(e.lane+dir,N);
        e.flipCD   = randi(48,130);
      }
    }
    if (e.type==='fuseball'){
      // Erratic lane changes — wanders unpredictably
      if (--e.lateralCD<=0){
        const maxL = tubeOpen ? N-2 : N;
        const dir  = Math.random()<0.5?1:-1;
        e.lane     = tubeOpen ? Math.max(0,Math.min(maxL,e.lane+dir)) : wrap(e.lane+dir,N);
        e.lateralCD = randi(14,35);
      }
      // Hover near the surface — bounce between depth 0.02 and 0.35
      if (e.depth < 0.02) { e.speed = -Math.abs(e.speed); }
      if (e.depth > 0.35) { e.speed =  Math.abs(e.speed); }
      // Extra erratic spin
      e.rotSpeed += rand(-0.03, 0.03);
      e.rotSpeed = Math.max(-0.25, Math.min(0.25, e.rotSpeed));
    }
    if (e.type==='spiker'){
      if (--e.spikeCD<=0){g.spikes.push({lane:e.lane,depth:e.depth+0.025});e.spikeCD=randi(7,14);}
      if (e.depth<0.1&&e.spikerDir===1){e.spikerDir=-1;e.speed=rand(0.005,0.007);}
      if (e.spikerDir===-1){e.depth+=e.speed*2;if (e.depth>0.96) return false;}
    }
    if (e.depth<=0 && e.type!=='fuseball'){if (e.type==='flipper') reachedRim.push(e);return false;}
    return true;
  });
  reachedRim.forEach(e => {
    // Flipper arrives at rim. State machine:
    // 'sliding' — glides along the lane segment between two outer nodes
    // 'flipping' — pivots 180° around a corner node to cross into adjacent lane
    const dir = Math.random() < 0.5 ? 1 : -1;
    g.rimEnemy.push({
      ...e,
      rimState:   'sliding',
      rimLane:    e.lane,       // integer lane index currently occupying
      slideT:     0.5,          // 0=left node, 1=right node of current lane
      slideDir:   dir,          // +1 toward right node, -1 toward left node
      slideSpeed: rand(0.008, 0.018),
      pivotNode:  -1,           // set when flipping
      flipAngle:  0,            // 0..PI sweep around pivot node
      flipDir:    dir,          // which direction flipping goes
    });
  });

  g.rimEnemy.forEach(e => {
    if (e.rimState === 'sliding') {
      e.slideT += e.slideDir * e.slideSpeed;

      if (e.slideT >= 1) {
        // Hit the right node of this lane — start flipping around it
        e.rimState  = 'flipping';
        e.pivotNode = wrap(e.rimLane + 1, N);
        e.flipAngle = 0;
        e.flipDir   = 1;   // sweeps from incoming lane side to outgoing lane side
        e.slideT    = 1;
      } else if (e.slideT <= 0) {
        // Hit the left node — flip around it
        e.rimState  = 'flipping';
        e.pivotNode = e.rimLane;
        e.flipAngle = 0;
        e.flipDir   = -1;
        e.slideT    = 0;
      }
    } else {
      // Flipping: sweep PI radians around the pivot node
      e.flipAngle += e.slideSpeed * 3.2;   // flip faster than slide

      if (e.flipAngle >= Math.PI) {
        // Flip complete — land in the adjacent lane and resume sliding
        if (e.flipDir === 1) {
          e.rimLane  = wrap(e.rimLane + 1, N);
          e.slideT   = 0;          // entered from left side
          e.slideDir = 1;
        } else {
          e.rimLane  = wrap(e.rimLane - 1, N);
          e.slideT   = 1;          // entered from right side
          e.slideDir = -1;
        }
        e.rimState = 'sliding';
        // Occasionally reverse direction after landing for unpredictability
        if (Math.random() < 0.22) {
          e.slideDir  *= -1;
        }
        // Handle open tube edges — bounce back
        if (tubeOpen && (e.rimLane <= 0 || e.rimLane >= N - 2)) {
          e.slideDir *= -1;
        }
      }
    }
  });

  // ── BULLETS vs ENEMIES + SPIKES ──
  g.bullets=g.bullets.filter(b=>{
    let hit=false;

    // Check rim enemies when bullet reaches the outer edge
    if (!hit && b.depth < 0.06) {
      g.rimEnemy=g.rimEnemy.filter(e=>{
        if (hit) return true;
        // Hittable from current lane OR destination lane during flip
        const inLane  = e.rimLane;
        const adjLane = e.rimState === 'flipping'
          ? wrap(e.rimLane + e.flipDir, N) : -1;
        if (b.lane !== inLane && b.lane !== adjLane) return true;

        const pivot = e.rimState === 'flipping' ? outer[e.pivotNode] : null;
        const lL    = outer[e.rimLane], lR = outer[wrap(e.rimLane+1,N)];
        const pos   = pivot
          ? { x: pivot.x, y: pivot.y }
          : { x: lerp(lL.x,lR.x,e.slideT), y: lerp(lL.y,lR.y,e.slideT) };
        boom(pos, 'flipper', 10);
        sfxExplosion(1.1);
        g.rimFlash = { lane: b.lane, timer: 10 };
        g.score += 150; g.waveKilled++; hit = true; return false;
      });
    }

    if (!hit){
      g.enemies=g.enemies.filter(e=>{
        if (hit||e.type==='fuseball'||e.lane!==b.lane||Math.abs(e.depth-b.depth)>0.1) return true;
        boom(lanePos(e.lane,e.depth),e.type); sfxExplosion(e.type==='tanker'?1.4:1);
        if (e.type==='tanker'){
          const spd=e.speed*1.35;
          for (const di of[-1,1]) g.enemies.push({type:'flipper',lane:wrap(e.lane+di,N),
            depth:e.depth,speed:spd,rot:0,rotSpeed:rand(-0.1,0.1),flipCD:randi(40,100)});
        }
        g.score+=({flipper:100,tanker:250,spiker:175})[e.type]||100;
        g.waveKilled++;hit=true;return false;
      });
    }
    if (!hit){
      g.spikes=g.spikes.filter(s=>{
        if (hit||s.lane!==b.lane||Math.abs(s.depth-b.depth)>0.09) return true;
        boom(lanePos(s.lane,s.depth),'spike',5);sfxExplosion(0.6);g.score+=50;hit=true;return false;
      });
    }
    return !hit;
  });

  // ── PLAYER DEATH ──
  if (g.mode==='playing'){
    const pl=p.lane;
    for (const e of g.rimEnemy){
      // Only kill player when flipper has fully landed and is sliding in their lane
      // During a flip = survival window — player can shoot it
      if (e.rimState === 'sliding' && e.rimLane === pl){ killPlayer(); break; }
    }
    if (g.mode==='playing'){
      for (const e of g.enemies){if (e.type==='fuseball'&&e.lane===pl&&e.depth<0.06){killPlayer();break;}}
    }
    if (g.mode==='playing'){
      for (const s of g.spikes){if (s.lane===pl&&s.depth<0.045){killPlayer();break;}}
    }
  }

  if (g.mode==='playing'&&++g.spawnTimer>=g.spawnRate){g.spawnTimer=0;spawnEnemy();}
  updateDronePitch(g.enemies.length+g.rimEnemy.length);

  if (g.mode==='playing'&&g.waveKilled>=g.waveCap&&!g.enemies.length&&!g.rimEnemy.length){
    g.score    += 1200 + g.level * 400;
    g.mode      = 'zoom';
    g.zoomScale = 1;
    g.zoomVel   = 0.04;   // starts slow, exponentially accelerates
    sfxLevelUp();
  }
  updateParticles();
}

function updateParticles(){
  gs.particles=gs.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;return p.life>0;
  });
}

// ─── DRAW ────────────────────────────────────────

// Scale a point away from the tube center — used during zoom transition
function zoomPt(pt) {
  const z = gs.zoomScale;
  if (z === 1) return pt;
  return { x: tubeCX + (pt.x - tubeCX) * z, y: tubeCY + (pt.y - tubeCY) * z };
}

function drawTube(){
  const z  = gs.zoomScale;
  const pl = gs.player.lane, pr = (pl+1)%N;

  // Active lane highlight fill (closed tubes only)
  if (z === 1 && !tubeOpen) {
    ctx.beginPath();ctx.moveTo(outer[pl].x,outer[pl].y);ctx.lineTo(outer[pr].x,outer[pr].y);
    ctx.lineTo(inner[pr].x,inner[pr].y);ctx.lineTo(inner[pl].x,inner[pl].y);
    ctx.closePath();ctx.fillStyle='rgba(0,180,255,0.06)';ctx.fill();
  }

  // Lane lines
  const laneCount = tubeOpen ? N - 1 : N;  // open: N-1 gaps between N points
  for (let i=0;i<laneCount;i++){
    const edge=(i===pl||i===pr);
    const op=zoomPt(outer[i]), ip=zoomPt(inner[i]);
    ctx.beginPath();ctx.moveTo(op.x,op.y);ctx.lineTo(ip.x,ip.y);
    ctx.lineWidth=edge?1.6:0.7;
    ctx.strokeStyle=edge&&z===1?PAL.tubeActive:PAL.tube;
    glow(edge&&z===1?PAL.aGlow:PAL.tubeGlow, edge?16:4);
    ctx.stroke();
  }

  // Outer rim — open tubes use lineTo only (no closePath)
  ctx.beginPath();
  outer.forEach((p,i)=>{ const q=zoomPt(p); i===0?ctx.moveTo(q.x,q.y):ctx.lineTo(q.x,q.y); });
  if (!tubeOpen) ctx.closePath();
  ctx.lineWidth=z>1?z*0.6:2.2;
  ctx.strokeStyle=z>1?PAL.tubeActive:PAL.tubeGlow;
  glow(z>1?PAL.aGlow:PAL.tubeGlow, z>1?28:18);
  ctx.stroke();

  // End caps on open tubes — bright vertical marks at each end
  if (tubeOpen && z===1) {
    [0, N-1].forEach(ei => {
      const op = outer[ei], ip = inner[ei];
      ctx.beginPath(); ctx.moveTo(op.x,op.y); ctx.lineTo(ip.x,ip.y);
      ctx.lineWidth=2.5; ctx.strokeStyle=PAL.tubeActive;
      glow(PAL.aGlow,18); ctx.stroke(); noGlow();
    });
  }

  // Rim shot flash
  if (gs.rimFlash && gs.rimFlash.timer > 0) {
    const rf   = gs.rimFlash;
    const alpha= rf.timer / 10;
    const rl   = rf.lane, rr = (rl + 1) % N;
    const opl  = zoomPt(outer[rl]), opr = zoomPt(outer[Math.min(rr, N-1)]);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(opl.x, opl.y); ctx.lineTo(opr.x, opr.y);
    ctx.lineWidth=8; ctx.strokeStyle=PAL.player;
    glow(PAL.player,30); ctx.stroke();
    ctx.globalAlpha=1; noGlow();
  }

  // Inner rim
  ctx.beginPath();
  inner.forEach((p,i)=>{ const q=zoomPt(p); i===0?ctx.moveTo(q.x,q.y):ctx.lineTo(q.x,q.y); });
  if (!tubeOpen) ctx.closePath();
  ctx.lineWidth=1.1;ctx.strokeStyle=PAL.tube;glow(PAL.tube,7);ctx.stroke();
  noGlow();
}

function drawPlayer(){
  if (gs.mode==='dead'||gs.mode==='gameover') return;

  const lf  = IS_MOBILE ? gs.player.laneFrac : gs.player.lane;
  const fl  = Math.floor(((lf % N) + N) % N);
  const f   = ((lf % N) + N) % N - fl;
  const r   = (fl + 1) % N;
  const rr  = (fl + 2) % N;

  const ptA = { x: lerp(outer[fl].x, outer[r].x,  f), y: lerp(outer[fl].y, outer[r].y,  f) };
  const ptB = { x: lerp(outer[r].x,  outer[rr].x, f), y: lerp(outer[r].y,  outer[rr].y, f) };

  const tipL = lanePos(fl, 0.09), tipR = lanePos(r, 0.09);
  const tip  = { x: lerp(tipL.x, tipR.x, f), y: lerp(tipL.y, tipR.y, f) };

  ctx.lineWidth=2.8; ctx.strokeStyle=PAL.player; glow(PAL.player,26);
  ctx.beginPath(); ctx.moveTo(ptA.x,ptA.y); ctx.lineTo(tip.x,tip.y); ctx.lineTo(ptB.x,ptB.y); ctx.stroke();
  const ca=lerpPt(ptA,ptB,0.22), cb=lerpPt(ptA,ptB,0.78);
  ctx.beginPath(); ctx.moveTo(ca.x,ca.y); ctx.lineTo(cb.x,cb.y); ctx.lineWidth=2; ctx.stroke();
  noGlow();
}

// ── Touch finger guide — shows where your finger maps to ──
function drawTouchGuide(){
  if (!IS_MOBILE || !touchActive || gs.mode!=='playing') return;

  if (!tubeOpen) {
    // Closed: ghost arc around the tube
    ctx.beginPath();
    ctx.arc(tubeCX, tubeCY, tubeOR * 1.18, 0, Math.PI*2);
    ctx.strokeStyle='rgba(0,200,255,0.08)'; ctx.lineWidth=tubeOR*0.22;
    ctx.stroke();
  } else {
    // Open: ghost bar above the outer rim showing the control zone
    const barY  = tubeOuterCY - 18;
    const halfW = tubeOR;
    ctx.beginPath();
    ctx.moveTo(tubeCX - halfW, barY); ctx.lineTo(tubeCX + halfW, barY);
    ctx.strokeStyle='rgba(0,200,255,0.12)'; ctx.lineWidth=12;
    ctx.stroke();
  }

  // Dot on the rim showing exact lane target
  if (touchLane !== -1) {
    const tl  = touchLane;
    const tr  = tubeOpen ? Math.min(tl + 1, N - 1) : (tl + 1) % N;
    const mid = {
      x: (outer[tl].x + outer[tr].x) / 2,
      y: (outer[tl].y + outer[tr].y) / 2,
    };
    // Line from finger to rim point
    ctx.beginPath();
    ctx.moveTo(touchCX, touchCY);
    ctx.lineTo(mid.x, mid.y);
    ctx.strokeStyle='rgba(0,238,255,0.22)'; ctx.lineWidth=1.5;
    ctx.setLineDash([4,6]); ctx.stroke(); ctx.setLineDash([]);

    // Rim indicator dot
    ctx.beginPath();
    ctx.arc(mid.x, mid.y, 7, 0, Math.PI*2);
    ctx.fillStyle=PAL.touchDot; glow(PAL.player,18); ctx.fill(); noGlow();

    // Finger dot
    ctx.beginPath();
    ctx.arc(touchCX, touchCY, 18, 0, Math.PI*2);
    ctx.fillStyle='rgba(0,238,255,0.18)'; ctx.fill();
    ctx.strokeStyle='rgba(0,238,255,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
  }
}

function drawEnemy(pos,type,size,rot){
  ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(rot);
  if (type==='flipper'){
    ctx.strokeStyle=PAL.flipper;ctx.lineWidth=1.6;glow(PAL.fGlow,15);
    ctx.beginPath();ctx.moveTo(0,-size);ctx.lineTo(size*.65,0);ctx.lineTo(0,size);ctx.lineTo(-size*.65,0);ctx.closePath();ctx.stroke();
    const s2=size*.45;ctx.beginPath();ctx.moveTo(0,-s2);ctx.lineTo(s2*.65,0);ctx.lineTo(0,s2);ctx.lineTo(-s2*.65,0);ctx.closePath();ctx.stroke();
  } else if (type==='spiker'){
    ctx.strokeStyle=PAL.spiker;ctx.lineWidth=1.6;glow(PAL.sGlow,14);
    for (let i=0;i<3;i++){
      const a1=(i/3)*Math.PI*2,a2=((i+.5)/3)*Math.PI*2,a3=((i+1)/3)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(Math.cos(a1)*size,Math.sin(a1)*size);
      ctx.lineTo(Math.cos(a2)*size*.28,Math.sin(a2)*size*.28);
      ctx.lineTo(Math.cos(a3)*size,Math.sin(a3)*size);ctx.stroke();
    }
  } else if (type==='fuseball'){
    // Chaotic electric spark — radiating lines with flickering lengths
    ctx.strokeStyle=PAL.fuseball;ctx.lineWidth=1.4;glow(PAL.fbGlow,20);
    const t=Date.now()*0.008;
    const arms=7;
    for (let i=0;i<arms;i++){
      const a=(i/arms)*Math.PI*2;
      const flicker=0.5+Math.sin(t*3.7+i*2.1)*0.3+Math.sin(t*7.3+i*4.9)*0.2;
      const len=size*flicker;
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*len,Math.sin(a)*len);ctx.stroke();
    }
    // Inner bright core
    ctx.beginPath();ctx.arc(0,0,size*0.18,0,Math.PI*2);
    ctx.fillStyle=PAL.fuseball;ctx.fill();
  } else if (type==='tanker'){
    ctx.strokeStyle=PAL.tanker;ctx.lineWidth=2;glow(PAL.tGlow,18);
    ctx.beginPath();ctx.arc(0,0,size,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-size*.72,-size*.72);ctx.lineTo(size*.72,size*.72);
    ctx.moveTo(size*.72,-size*.72);ctx.lineTo(-size*.72,size*.72);ctx.stroke();
  }
  ctx.restore();noGlow();
}

function drawEnemies(){
  gs.enemies.forEach(e=>drawEnemy(lanePos(e.lane,e.depth),e.type,lerp(13,3,e.depth),e.rot));
  gs.rimEnemy.forEach(e => {
    let pos, rimAngle, drawSize;

    if (e.rimState === 'sliding') {
      const lL = e.rimLane, lR = wrap(e.rimLane + 1, N);
      pos = {
        x: lerp(outer[lL].x, outer[lR].x, e.slideT),
        y: lerp(outer[lL].y, outer[lR].y, e.slideT),
      };
      rimAngle = Math.atan2(
        outer[lR].y - outer[lL].y,
        outer[lR].x - outer[lL].x
      ) + Math.PI / 2;
      drawSize = 13;
    } else {
      const pivot     = outer[e.pivotNode];
      const pnA = tubeOpen ? Math.max(0,Math.min(N-1,e.pivotNode-1)) : wrap(e.pivotNode-1,N);
      const pnB = tubeOpen ? Math.max(0,Math.min(N-1,e.pivotNode+1)) : wrap(e.pivotNode+1,N);
      const laneIn    = e.flipDir === 1 ? outer[pnA] : outer[pnB];
      const baseAngle = Math.atan2(laneIn.y - pivot.y, laneIn.x - pivot.x);
      const toCenter  = Math.atan2(tubeCY - pivot.y, tubeCX - pivot.x);
      let diff = toCenter - baseAngle;
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const sweepDir   = diff > 0 ? 1 : -1;
      const sweepAngle = baseAngle + e.flipAngle * sweepDir;
      const armLen     = tubeOR * 0.065;
      pos = {
        x: pivot.x + Math.cos(sweepAngle) * armLen,
        y: pivot.y + Math.sin(sweepAngle) * armLen,
      };
      rimAngle = sweepAngle + Math.PI / 2;
      // Grow at mid-arc so it's clearly visible and shootable as it crests inward
      const midArc = Math.sin(e.flipAngle);  // 0 → 1 → 0 over the 180° flip
      drawSize = 13 + midArc * 20;
    }

    drawEnemy(pos, 'flipper', drawSize, rimAngle);
  });
}
function drawBullets(){
  gs.bullets.forEach(b=>{
    const pos=lanePos(b.lane,b.depth),size=lerp(5.5,1.5,b.depth);
    ctx.beginPath();ctx.arc(pos.x,pos.y,size,0,Math.PI*2);
    ctx.fillStyle=PAL.bullet;glow(PAL.bGlow,14);ctx.fill();
  });noGlow();
}
function drawSpikes(){
  gs.spikes.forEach(s=>{
    const pos=lanePos(s.lane,s.depth),size=lerp(7,2,s.depth);
    ctx.beginPath();ctx.moveTo(pos.x,pos.y-size);
    ctx.lineTo(pos.x+size*.58,pos.y+size*.55);ctx.lineTo(pos.x-size*.58,pos.y+size*.55);
    ctx.closePath();ctx.strokeStyle=PAL.spike;ctx.lineWidth=1;glow(PAL.spGlow,9);ctx.stroke();
  });noGlow();
}
function drawParticles(){
  gs.particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*Math.sqrt(p.life),0,Math.PI*2);
    ctx.fillStyle=p.col;glow(p.col,10);ctx.fill();
  });ctx.globalAlpha=1;noGlow();
}

function drawZapButton(){
  if (!IS_MOBILE) return;
  const bh=zapBtnH(), by=gameH();
  const active=gs.zapUsed<2&&gs.mode==='playing';
  ctx.fillStyle=active?'rgba(40,36,0,0.92)':'rgba(12,12,22,0.92)';
  ctx.fillRect(0,by,W,bh);
  ctx.strokeStyle=active?PAL.zapper:'#222244';ctx.lineWidth=1;
  if (active) glow(PAL.zGlow,6);
  ctx.beginPath();ctx.moveTo(0,by);ctx.lineTo(W,by);ctx.stroke();noGlow();
  const fs=Math.max(14,Math.floor(bh*0.32));
  ctx.font=`bold ${fs}px "IBM Plex Mono"`;ctx.textAlign='center';
  if (active){
    ctx.fillStyle=PAL.zapper;glow(PAL.zGlow,12);
    ctx.fillText(gs.zapUsed===0?'⚡  SUPERZAPPER':'⚡  SUPERZAPPER  ·  WEAKENED',W/2,by+bh*0.62);
  } else {
    ctx.fillStyle='#334';ctx.fillText('SUPERZAPPER  ·  DEPLETED',W/2,by+bh*0.62);
  }
  const msz=Math.max(10,Math.floor(bh*0.22));
  ctx.font=`${msz}px "IBM Plex Mono"`;ctx.textAlign='right';
  ctx.fillStyle=muted?'#334':PAL.hud;
  ctx.fillText(muted?'♪ OFF':'♪ ON',W-12,by+bh*0.3);noGlow();
}

function isZapTouch(y){ return IS_MOBILE&&y>=gameH(); }
function isMuteTouch(x,y){
  if (IS_MOBILE) return y>=gameH()&&x>=W*0.72;
  return Math.abs(x-W/2)<W*0.24&&Math.abs(y-(H-22))<18;
}

function drawMiniClaw(cx,cy,sz){
  // Mini version of the player claw: V-shape + crossbar
  ctx.strokeStyle=PAL.player;ctx.lineWidth=1.6;glow(PAL.pGlow,10);
  ctx.beginPath();
  ctx.moveTo(cx-sz,cy+sz*0.4);
  ctx.lineTo(cx,cy-sz*0.6);
  ctx.lineTo(cx+sz,cy+sz*0.4);
  ctx.stroke();
  // crossbar
  ctx.beginPath();
  ctx.moveTo(cx-sz*0.56,cy+sz*0.12);
  ctx.lineTo(cx+sz*0.56,cy+sz*0.12);
  ctx.stroke();noGlow();
}
function fsz(frac){ return `${Math.floor(Math.min(W,H)*frac)}px "IBM Plex Mono"`; }

function drawHUD(){
  ctx.font=fsz(1/46);ctx.fillStyle=PAL.hud;
  ctx.textAlign='left'; ctx.fillText(`SCORE  ${String(gs.score).padStart(7,'0')}`,12,26);
                        ctx.fillText(`HI     ${String(gs.hiScore).padStart(7,'0')}`,12,44);
  ctx.textAlign='right';ctx.fillText(`LEVEL  ${gs.level}`,W-12,26);
  ctx.fillText('LIVES',W-12,44);
  const livesCount=Math.max(0,gs.lives);
  const clawSz=7, clawGap=20;
  const livesTextW=ctx.measureText('LIVES').width;
  for (let i=0;i<livesCount;i++){
    drawMiniClaw(W-12-livesTextW-10-(livesCount-1-i)*clawGap, 40, clawSz);
  }

  // Shape name banner — fades in then out at level start
  if (gs.shapeTimer > 0 && gs.shapeName) {
    const t   = gs.shapeTimer / 120;
    const alpha = t < 0.2 ? t / 0.2 : t > 0.7 ? (t - 0.7) / 0.3 : 1;
    ctx.globalAlpha = alpha;
    ctx.textAlign   = 'center';
    ctx.font        = `bold ${Math.floor(Math.min(W,gameH()) / 18)}px "IBM Plex Mono"`;
    ctx.fillStyle   = PAL.tubeActive;
    glow(PAL.aGlow, 22);
    ctx.fillText(gs.shapeName, W/2, IS_MOBILE ? gameH()*0.5 + Math.min(W,gameH())*0.22 : H*0.5 + Math.min(W,H)*0.22);
    noGlow();
    ctx.globalAlpha = 1;
  }

  if (!IS_MOBILE){
    ctx.textAlign='center';
    ctx.fillStyle=gs.zapUsed<2?PAL.zapper:'#443300';
    if (gs.zapUsed<2) glow(PAL.zGlow,8);
    ctx.fillText(gs.zapUsed===0?'[ Z ]  SUPERZAPPER':gs.zapUsed===1?'[ Z ]  SUPERZAPPER  ·  WEAKENED':'       SUPERZAPPER  ·  DEPLETED',W/2,H-42);
    noGlow();
    ctx.font=fsz(1/52);ctx.fillStyle=muted?'#334':PAL.zapper;
    if (!muted) glow(PAL.zGlow,7);
    ctx.fillText(muted?'♪  SOUND OFF  [ M ]':'♪  SOUND ON  [ M ]',W/2,H-22);noGlow();
  }
  if (IS_MOBILE) drawZapButton();
}

// ─── KEYBOARD INPUT ──────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  const handled=['Space','ArrowLeft','ArrowRight','ArrowUp','KeyA','KeyD','KeyX','KeyZ','KeyM'];
  if (handled.includes(e.code)) e.preventDefault();
  keys[e.code]=true;
  if (e.code==='Space'){ensureAudio();if(gs.mode==='title')startGame();if(gs.mode==='gameover')gs.mode='title';}
  if (e.code==='KeyZ') activateZapper();
  if (e.code==='KeyM'){ensureAudio();toggleMute();}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ─── TRACKPAD / WHEEL ────────────────────────────
canvas.addEventListener('wheel',e=>{
  e.stopPropagation();
  const delta=Math.abs(e.deltaX)>=Math.abs(e.deltaY)*0.3?e.deltaX:e.deltaY;
  spinVel+=delta*WHEEL_MULT;
  spinVel=Math.max(-SPIN_MAX,Math.min(SPIN_MAX,spinVel));
  ensureAudio();
  if (gs.mode==='title')    startGame();
  if (gs.mode==='gameover') gs.mode='title';
},{passive:false});

// Desktop click = stop spinner or mute
canvas.addEventListener('click',e=>{
  if (IS_MOBILE) return;
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(W/rect.width),cy=(e.clientY-rect.top)*(H/rect.height);
  if (isMuteTouch(cx,cy)){ensureAudio();toggleMute();return;}
  spinVel=0;spinAccum=0;
});

// ─── TOUCH INPUT — absolute angular ──────────────
function getTouchCanvasPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top)  * (H / rect.height),
  };
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); ensureAudio();
  const touch=e.changedTouches[0];
  const {x,y}=getTouchCanvasPos(touch);

  // Zapper / mute strip
  if (isZapTouch(y)){
    if (isMuteTouch(x,y)){toggleMute();return;}
    activateZapper();return;
  }

  // Start game
  if (gs.mode==='title'){startGame();return;}
  if (gs.mode==='gameover'){gs.mode='title';return;}

  // Claim this touch as the movement finger
  touchId     = touch.identifier;
  touchActive = true;
  touchCX     = x; touchCY = y;
  touchLane   = touchToLane(x, y);
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  // Find our tracked finger
  for (let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if (t.identifier!==touchId) continue;
    const {x,y}=getTouchCanvasPos(t);
    // Ignore if in zapper strip
    if (isZapTouch(y)) break;
    touchCX   = x; touchCY = y;
    touchLane = touchToLane(x, y);
    break;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  for (let i=0;i<e.changedTouches.length;i++){
    if (e.changedTouches[i].identifier===touchId){
      touchActive=false; touchId=null; touchLane=-1; break;
    }
  }
},{passive:false});

canvas.addEventListener('touchcancel',e=>{
  e.preventDefault(); touchActive=false; touchId=null; touchLane=-1;
},{passive:false});

// ─── MAIN LOOP ───────────────────────────────────
function drawZoomEffect(){
  const z    = gs.zoomScale;
  const spd  = Math.min((z - 1) * 0.06, 0.85);
  const cx   = tubeCX, cy = tubeCY;
  const nLines = 32;
  for (let i = 0; i < nLines; i++){
    const a   = (i / nLines) * Math.PI * 2;
    const r1  = tubeOR * (0.5 + (z - 1) * 0.12);
    const r2  = tubeOR * (1.8 + (z - 1) * 0.35);
    const x1  = cx + Math.cos(a) * r1, y1 = cy + Math.sin(a) * r1;
    const x2  = cx + Math.cos(a) * r2, y2 = cy + Math.sin(a) * r2;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle = `rgba(0,200,255,${spd * 0.55})`;
    ctx.lineWidth   = 1 + spd * 1.5;
    ctx.stroke();
  }

  // Show next shape name as we accelerate
  if (z > 2) {
    const alpha     = Math.min((z - 2) / 4, 0.9);
    const nextIdx   = shapeSequence[shapeSeqPos % shapeSequence.length] ?? 0;
    const nextShape = TUBE_SHAPES[nextIdx].name;
    ctx.globalAlpha = alpha;
    ctx.textAlign   = 'center';
    ctx.font        = `bold ${Math.floor(Math.min(W,gameH()) / 12)}px "IBM Plex Mono"`;
    ctx.fillStyle   = PAL.tubeActive;
    glow(PAL.aGlow, 28);
    ctx.fillText('LEVEL ' + (gs.level + 1), cx, cy - Math.min(W,gameH())*0.06);
    ctx.font = `${Math.floor(Math.min(W,gameH()) / 20)}px "IBM Plex Mono"`;
    ctx.fillText(nextShape, cx, cy + Math.min(W,gameH())*0.05);
    noGlow();
    ctx.globalAlpha = 1;
  }

  // White flash as we exit
  if (z > 8){
    const alpha = Math.min((z - 8) / 12, 0.9);
    ctx.fillStyle = `rgba(0,220,255,${alpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

function loop(){
  ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,W,H);
  if (gs.flash>0){ctx.fillStyle=`rgba(255,255,180,${(gs.flash/14)*0.45})`;ctx.fillRect(0,0,W,H);}

  const zooming = gs.mode === 'zoom';

  drawTube();
  if (zooming){
    drawZoomEffect();
  } else {
    drawTouchGuide();
    drawSpikes(); drawBullets(); drawEnemies(); drawPlayer(); drawParticles();
  }

  if (gs.mode!=='title'&&gs.mode!=='zoom') drawHUD();
  if (gs.mode==='title')    drawTitle();
  if (gs.mode==='gameover') drawGameOver();
  if (gs.mode==='levelup')  drawLevelUp();

  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.018)';
  for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
